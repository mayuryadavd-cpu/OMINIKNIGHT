kind = "web"
previewPath = "/"
title = "OmniKnight Express Laundry Studio"
version = "1.0.0"
id = "artifacts/omniknight"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21912

[services.development]
run = "pnpm --filter @workspace/omniknight run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omniknight", "run", "build" ]
publicDir = "artifacts/omniknight/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21912"
BASE_PATH = "/"
